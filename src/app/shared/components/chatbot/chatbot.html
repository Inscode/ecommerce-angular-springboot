<div class="chatbot">

  <!-- Toggle button -->
  <button class="chatbot__toggle"
          (click)="toggleChat()"
          [class.active]="isOpen()">
    <svg *ngIf="!isOpen()" width="24" height="24"
         fill="none" stroke="currentColor"
         stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <svg *ngIf="isOpen()" width="24" height="24"
         fill="none" stroke="currentColor"
         stroke-width="2" viewBox="0 0 24 24">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    <span class="chatbot__toggle-label" *ngIf="!isOpen()">
      Chat with us
    </span>
  </button>

  <!-- Chat window -->
  <div class="chatbot__window" *ngIf="isOpen()">

    <!-- Header -->
    <div class="chatbot__header">
      <div class="chatbot__header-info">
        <div class="chatbot__avatar">G</div>
        <div>
          <p class="chatbot__name">Ghanim Assistant</p>
          <p class="chatbot__status">
            <span class="chatbot__online"></span>
            Online
          </p>
        </div>
      </div>
      <button class="chatbot__clear"
              (click)="clearChat()"
              title="Clear chat">
        <svg width="16" height="16" fill="none"
             stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div class="chatbot__messages" #messagesContainer>
      <div class="chatbot__message"
           *ngFor="let msg of messages()"
           [class.chatbot__message--user]="msg.role === 'user'"
           [class.chatbot__message--bot]="msg.role === 'assistant'">
        <div class="chatbot__bubble">
          {{ msg.content }}
        </div>
        <p class="chatbot__time">
          {{ formatTime(msg.timestamp) }}
        </p>
      </div>

      <!-- Typing indicator -->
      <div class="chatbot__message chatbot__message--bot"
           *ngIf="isTyping()">
        <div class="chatbot__bubble chatbot__bubble--typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Suggested questions -->
    <div class="chatbot__suggestions"
         *ngIf="messages().length === 1">
      <button class="chatbot__suggestion"
              *ngFor="let q of suggestedQuestions"
              (click)="askSuggested(q)">
        {{ q }}
      </button>
    </div>

    <!-- Input -->
    <div class="chatbot__input-area">
      <input class="chatbot__input"
             type="text"
             placeholder="Ask about products, prices..."
             [value]="inputText()"
             (input)="onInput($event)"
             (keydown)="onKeyDown($event)"
             [disabled]="isTyping()" />
      <button class="chatbot__send"
              (click)="sendMessage()"
              [disabled]="!inputText().trim() || isTyping()">
        <svg width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
</div>
