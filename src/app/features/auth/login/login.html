<div class="auth-page">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-card__brand">
      <a routerLink="/" class="auth-card__logo">
        <span class="auth-card__logo-icon">G</span>
        <div>
          <span class="auth-card__logo-name">Ghanim</span>
          <span class="auth-card__logo-sub">Enterprises</span>
        </div>
      </a>
      <h1 class="auth-card__title">Welcome back</h1>
      <p class="auth-card__subtitle">Sign in to your account to continue</p>
    </div>

    <!-- Error message -->
    <div class="auth-error" *ngIf="errorMessage()">
      <svg
        width="16"
        height="16"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ errorMessage() }}
    </div>

    <!-- Form -->
    <div class="auth-form">
      <!-- Email -->
      <div class="auth-field">
        <label class="auth-field__label">Email Address</label>
        <div class="auth-field__input-wrap">
          <svg
            class="auth-field__icon"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            viewBox="0 0 24 24"
          >
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          <input
            type="email"
            class="auth-field__input"
            placeholder="Enter your email"
            [value]="email()"
            (input)="onEmailInput($event)"
            (keyup.enter)="onSubmit()"
            autocomplete="email"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="auth-field">
        <div class="auth-field__label-row">
          <label class="auth-field__label">Password</label>
          <a href="#" class="auth-field__forgot">Forgot password?</a>
        </div>
        <div class="auth-field__input-wrap">
          <svg
            class="auth-field__icon"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
          <input
            [type]="showPassword() ? 'text' : 'password'"
            class="auth-field__input"
            placeholder="Enter your password"
            [value]="password()"
            (input)="onPasswordInput($event)"
            (keyup.enter)="onSubmit()"
            autocomplete="current-password"
          />
          <button class="auth-field__toggle" type="button" (click)="togglePassword()">
            <svg
              *ngIf="!showPassword()"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              viewBox="0 0 24 24"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg
              *ngIf="showPassword()"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              viewBox="0 0 24 24"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
              />
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="auth-btn" (click)="onSubmit()" [disabled]="isLoading()">
        <span *ngIf="!isLoading()">Sign In</span>
        <span class="auth-btn__loading" *ngIf="isLoading()">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
            />
          </svg>
          Signing in...
        </span>
      </button>
    </div>

    <!-- Divider -->
    <div class="auth-divider">
      <span>or</span>
    </div>

    <!-- Register link -->
    <p class="auth-card__switch">
      Don't have an account?
      <a routerLink="/auth/register">Create account</a>
    </p>

    <!-- Wholesale note -->
    <div class="auth-wholesale">
      <svg
        width="14"
        height="14"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      Wholesale customers — use your wholesale account credentials to access wholesale pricing
    </div>
  </div>
</div>
